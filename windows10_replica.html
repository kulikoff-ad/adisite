<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Windows 10 Реплика</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #F0F0F0;
        }
        
        .desktop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 40px);
            background-color: #FFFFFF;
        }
        
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background-color: #1E1E1E;
            display: flex;
            align-items: center;
            padding-left: 10px;
        }
        
        .start-menu {
            color: white;
            cursor: pointer;
            user-select: none;
        }
        
        .clock {
            margin-left: auto;
            color: white;
        }
        
        .start-menu-container {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 300px;
            background-color: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 1000;
            transform: translateY(-100%);
            transition: transform 0.3s ease-in-out;
        }
        
        .start-menu-container.hidden {
            transform: translateY(0);
        }
        
        .window {
            position: absolute;
            width: 600px;
            min-height: 400px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .window-header {
            background-color: #DCDCDC;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
        }
        
        .close-button {
            cursor: pointer;
            font-weight: bold;
            background: transparent;
            border: none;
            color: red;
        }
        
        textarea {
            width: 100%;
            height: 100%;
            resize: none;
            outline: none;
            border: none;
            padding: 10px;
        }
    </style>
</head>
<body>
<div class="desktop"></div>

<div class="taskbar">
    <button class="start-menu">🌐 Start</button>
    <span class="clock">12:00 PM</span>
</div>

<div class="start-menu-container hidden">
    <ul style="list-style-type:none;padding:0;margin:0;">
        <li><button onclick="openApp('notepad')">Блокнот</button></li>
        <li><button onclick="openApp('explorer')">Проводник</button></li>
        <li><button onclick="openApp('settings')">Настройки</button></li>
    </ul>
</div>

<script>
    let isDragging = false;
    let currentWindow;
    let offsetX, offsetY;

    document.querySelector('.start-menu').addEventListener('click', () => {
        document.querySelector('.start-menu-container').classList.toggle('hidden');
    });

    document.querySelectorAll('.close-button').forEach(button => {
        button.addEventListener('click', () => {
            const windowElement = button.closest('.window');
            if (windowElement) windowElement.remove();
        });
    });

    document.querySelectorAll('.window-header').forEach(header => {
        header.addEventListener('mousedown', e => {
            isDragging = true;
            currentWindow = e.currentTarget.parentNode;
            const rect = currentWindow.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
        });
    });

    document.addEventListener('mousemove', e => {
        if (!isDragging || !currentWindow) return;
        currentWindow.style.left = `${e.clientX - offsetX}px`;
        currentWindow.style.top = `${e.clientY - offsetY}px`;
    });

    document.addEventListener('mouseup', () => {
        isDragging = false;
        currentWindow = null;
    });

    function openApp(appName) {
        const newWindow = document.createElement('div');
        newWindow.classList.add('window');
        newWindow.innerHTML = `
            <div class="window-header">
                <h2>${appName}</h2>
                <button class="close-button">X</button>
            </div>
            <div class="window-body">
                ${appName === 'notepad' ? '<textarea></textarea>' : ''}
            </div>
        `;
        document.body.appendChild(newWindow);
        newWindow.querySelector('.close-button').addEventListener('click', () => {
            newWindow.remove();
        });
        newWindow.querySelector('.window-header').addEventListener('mousedown', e => {
            isDragging = true;
            currentWindow = e.currentTarget.parentNode;
            const rect = currentWindow.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
        });
    }
</script>
</body>
</html>
